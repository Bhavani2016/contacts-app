server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip text-based assets for faster loads.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Cache hashed static assets aggressively — Vite fingerprints filenames
    # (e.g. index-B19pdI4p.js), so a new deploy gets a new filename and this
    # cache header can never serve stale code.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Single-page app fallback: any path that isn't a real file falls back
    # to index.html so client-side routing (if added later) still works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}